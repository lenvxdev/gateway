# ============================================================
# Gateway Server Properties
# ============================================================

# ----------------------------
# Network
# ----------------------------
# Maximum concurrent players (-1 = unlimited)
max-players=-1

# Bind host and port
# Use 127.0.0.1 for local-only access
server-ip=0.0.0.0
server-port=30000

# Tick rate and view range
ticks-per-second=5
view-distance=6

# ----------------------------
# Proxy Forwarding
# ----------------------------
# Protocol translation mode:
# - builtin : built-in translation path (recommended)
# - off     : strict native protocol only
protocol-translation-mode=builtin

# Exactly one of the following modes should be true:
# - bungeecord
# - velocity-modern
# - bungee-guard
bungeecord=false
velocity-modern=false
bungee-guard=false
forge-handshake-emulation=true

# Secrets for Velocity modern forwarding or BungeeGuard
# Multiple values are separated with ';'
forwarding-secrets=

# ----------------------------
# World
# ----------------------------
# Format: <world_name>;<schematic_file>
level-name=world;spawn.schem

# One of:
# - minecraft:overworld
# - minecraft:the_nether
# - minecraft:the_end
level-dimension=minecraft:overworld

# Format: <world_name>;<x>;<y>;<z>;<yaw>;<pitch>
world-spawn=world;20.5;17;22.5;-90;0

# Player defaults
# One of: survival, creative, adventure, spectator
default-gamemode=adventure
allow-flight=false
allow-chat=true

# ----------------------------
# Security & Limits
# ----------------------------
# Maximum inbound framed packet size (bytes)
max-packet-size-bytes=262144

# Per-connection inbound packet rate limit (packets/sec)
max-inbound-packets-per-second=400

# Payload limits
max-chat-message-length=256
max-command-length=256
max-plugin-message-payload-bytes=32767
max-command-args=64

# Whitelist enforcement (uses whitelist.json format)
enforce-whitelist=false

# ----------------------------
# Logging & Diagnostics
# ----------------------------
reduced-debug-info=true
log-player-ip-addresses=false
handshake-verbose=false

# ----------------------------
# Server List / Branding
# ----------------------------
# Supports MiniMessage (preferred) or raw JSON component syntax
version=Gateway
motd=<yellow>Gateway Server!</yellow>

# Tab list decorations (JSON component, may be blank)
tab-header=
tab-footer=

# ----------------------------
# Resource Pack
# ----------------------------
# Leave blank to disable
resource-pack=
resource-pack-sha1=
required-resource-pack=false
resource-pack-prompt=<yellow>Install server resource pack!</yellow>
